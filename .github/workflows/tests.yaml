name: Run All Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyYAML PyPDF2 pandas
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers

      - name: Run Task-1 tests
        run: python -m unittest extractor.TestTask1 -v

      - name: Run Task-2 tests
        run: python -m unittest comparator.TestTask2 -v

      - name: Run Task-3 tests
        run: python -m unittest executor.TestTask3 -v
